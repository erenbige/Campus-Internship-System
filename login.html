<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCampus - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }
        .login-card .card-header { background-color: #0d6efd; color: white; text-align: center; border-radius: 15px 15px 0 0; padding: 20px; }
        .btn-login { border-radius: 25px; padding: 10px 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card">
                <div class="card-header">
                    <h3>🎓 CodeCampus</h3>
                    <p class="mb-0">Campus Internship & Job Tracking System</p>
                </div>
                <div class="card-body p-4">
                    <form>
                        <div class="mb-4 text-center">
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="btnradio" id="btnStudent" checked>
                                <label class="btn btn-outline-primary" for="btnStudent">Student</label>
                                <input type="radio" class="btn-check" name="btnradio" id="btnCompany">
                                <label class="btn btn-outline-primary" for="btnCompany">Company</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@university.edu">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="••••••••">
                        </div>
                        <div class="d-grid mt-4">
                            <button type="button" class="btn btn-primary btn-login">Login to Dashboard</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
